name: odia_barnamala
description: Interactive Odia Barnamala learning app for toddlers.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  audioplayers: ^6.0.0
  lottie: ^3.1.0
  confetti: ^0.7.0
  google_fonts: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: NotoSansOriya
      fonts:
        - asset: assets/fonts/NotoSansOriya-Regular.ttf
